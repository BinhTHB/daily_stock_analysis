[Settings]
# IB Gateway settings — overridden by env vars
IbLoginId=
IbPassword=
PasswordEncrypted=no
StoreSettingsOnServer=no

[IBController]
# Port for API traffic
IbControllerPort=7462
TradingMode=paper
AcceptNonBrokerageSessions=yes
ClosedownAt=221500  # Auto-close at 22:15 UTC (5:15 ET) to kill daily
MinimizeMainWindow=Yes

[Logging]
LogPath=/opt/ibc/logs
