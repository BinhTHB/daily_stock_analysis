name: Schedule Trigger

# This file is the entry point for scheduled runs and resides only on the default branch (main).
# GitHub Actions schedule trigger only runs on the default branch.
# The actual execution logic is located in .github/workflows/00-daily-analysis.yml on working-branch.
# This workflow triggers the target workflow on working-branch using the workflow_dispatch API.

on:
  schedule:
    - cron: '0 21 * * 1-5'   # Monday to Friday, UTC 21:00 = Vietnam time 04:00 (for US market close)

  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution Mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: 'Force execution (skip trading day check)'
        required: false
        default: false
        type: boolean
      demo_mode:
        description: 'Run with Demo account (testing purpose)'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

# Required to dispatch another workflow via API (actions:write)
permissions:
  actions: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger analysis on working-branch
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = '00-daily-analysis.yml';
            const ref = 'working-branch';
            const inputs = {
              mode: '${{ github.event.inputs.mode || 'full' }}',
              force_run: '${{ github.event.inputs.force_run || 'false' }}',
              demo_mode: '${{ github.event.inputs.demo_mode || 'false' }}',
            };
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflow,
              ref: ref,
              inputs: inputs,
            });
            console.log(`Triggered ${workflow} on ${ref} with inputs:`, inputs);
