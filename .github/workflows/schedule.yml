name: Schedule Trigger

# 本文件是定时触发入口，只存在于默认分支（main）上。
# GitHub 定时任务（schedule）只在默认分支生效。
# 实际分析逻辑位于 working-branch 的 00-daily-analysis.yml 中。
# 本文件通过 API workflow_dispatch 转发 trigger 到 working-branch。

on:
  schedule:
    - cron: '0 21 * * 1-5'   # 周一到周五，UTC 21:00 = 越南时间 04:00 (针对美股收盘)

  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean
      demo_mode:
        description: '使用 Demo 账号运行（测试用途）'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger analysis on working-branch
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = '00-daily-analysis.yml';
            const ref = 'working-branch';
            const inputs = {
              mode: '${{ github.event.inputs.mode || 'full' }}',
              force_run: '${{ github.event.inputs.force_run || 'false' }}',
              demo_mode: '${{ github.event.inputs.demo_mode || 'false' }}',
            };
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflow,
              ref: ref,
              inputs: inputs,
            });
            console.log(`Triggered ${workflow} on ${ref} with inputs:`, inputs);
